<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STRIDE Threat Modeler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0d1117; color: #c9d1d9; }
    .card { background: #161b22; border-color: #30363d; }
    .navbar-custom { background: #161b22; border-bottom: 1px solid #30363d; }
    .nav-tabs { border-bottom-color: #30363d; }
    .nav-tabs .nav-link { color: #8b949e; border-color: transparent; }
    .nav-tabs .nav-link.active { background: #0d1117; border-color: #30363d #30363d #0d1117; color: #e6edf3; }
    .threat-card { border-left: 4px solid; border-radius: 6px; padding: .75rem 1rem; margin-bottom: .5rem; background: #161b22; }
    .threat-critical { border-color: #da3633; }
    .threat-high     { border-color: #e3b341; }
    .threat-medium   { border-color: #d29922; }
    .threat-low      { border-color: #3fb950; }
    .metric-value { font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .drop-zone {
      border: 2px dashed #30363d; border-radius: 8px;
      padding: 3rem 1rem; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #58a6ff; background: rgba(88,166,255,.06); }
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(13,17,23,.93);
      display: none; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: 1.5rem;
    }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: .75rem; white-space: pre-wrap; word-break: break-word; }
    .accordion-item { background: #161b22; border-color: #30363d; }
    .accordion-button { background: #1e2432; color: #c9d1d9; }
    .accordion-button:not(.collapsed) { background: #1f2937; color: #e6edf3; box-shadow: none; }
    .accordion-button:focus { box-shadow: none; }
    .accordion-body { background: #0d1117; }
    /* Markdown report styling */
    #report-html h1,#report-html h2,#report-html h3 { border-bottom: 1px solid #30363d; padding-bottom:.3rem; margin-top:1.5rem; }
    #report-html table { width:100%; border-collapse:collapse; margin:1rem 0; }
    #report-html th,#report-html td { border:1px solid #30363d; padding:.5rem .75rem; }
    #report-html th { background:#161b22; }
    #report-html code { background:#161b22; padding:.1rem .4rem; border-radius:4px; font-size:.875em; }
    #report-html pre code { background:transparent; padding:0; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-custom px-4 py-2">
    <a class="navbar-brand fw-bold" href="/">🛡️ STRIDE Threat Modeler</a>
    <span class="text-muted small">FIAP Hackathon — Fase 5</span>
  </nav>
  <main class="container-xl py-4">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
